spring:
  application:
    name: google-bigquery-tech-adapter

logging:
  level:
    org.zalando.logbook: TRACE

logbook:
  obfuscate:
    headers:
      - Authorization
      - X-API-Key

server:
  port: 8888

springdoc:
  swagger-ui:
    path: /docs

principalMappingService:
  groupMailDomain: ""

retry:
  initial-backoff-ms: 500
  max-backoff-ms: 8000
  max-total-wait-ms: 120000